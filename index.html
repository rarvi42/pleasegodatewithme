<!DOCTYPE html>
<html>
<head>
<title>Please Go Date With Me ❤️</title>

<style>

body{
background:#ffd6e7;
font-family:Arial;
text-align:center;
margin-top:100px;
}

h1{
font-size:50px;
}

button{
padding:15px 25px;
font-size:20px;
margin:20px;
border-radius:20px;
cursor:pointer;
}

#no{
position:absolute;
}

</style>

</head>

<body>

<h1>Will you go on a date with me? ❤️</h1>

<button onclick="yes()">Yes 😊</button>

<button id="no" onmouseover="moveButton()">No 😢</button>

<script>

function yes(){
alert("Yayyyyy ❤️");
}

function moveButton(){

let x=Math.random()*500;
let y=Math.random()*500;

document.getElementById("no").style.left=x+"px";
document.getElementById("no").style.top=y+"px";

}

</script>

</body>
</html>
