<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will you go on a date with me? 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hearts-bg" id="hearts-bg"></div>

  <!-- MAIN PAGE -->
  <div class="container" id="main-page">
    <h1>Will you go on a date with me? 💕</h1>
    <p class="subtitle" id="subtitle">I already have the perfect day planned... 🌸</p>

    <div class="gif-container">
      <img id="cat-gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif" alt="cute character">
    </div>

    <div class="buttons">
      <button id="yes-btn" onclick="handleYes()">Yes!! 🥰</button>
      <button id="no-btn" onclick="handleNo()">No</button>
    </div>

    <div id="tease-toast"></div>
  </div>

  <!-- SUCCESS PAGE -->
  <div id="success-page">
    <h1>Knew you'd say yes! 🎉</h1>
    <div class="gif-container">
      <img src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="celebrating" style="width:200px;height:200px;border-radius:14px;object-fit:contain;">
    </div>
    <p class="yes-message">You just made me the happiest person! 💕</p>
    <div class="date-badge">💌 Reserve Saturday, 30th May 2026 I have something special planned just for you 🌹</div>
    <p class="cant-wait">Can't wait for our date! 🌸</p>
  </div>

  <audio id="bg-music" loop autoplay muted>
    <source src="beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

  <script src="script.js"></script>
</body>
</html>
