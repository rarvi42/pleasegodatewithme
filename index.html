<script>

let yesSize = 20;
let noSize = 20;

function yes(){
    alert("Yayyyyy ❤️");
}

document.getElementById("no").addEventListener("click", function(){

    yesSize += 10;
    noSize -= 2;

    document.querySelector("button").style.fontSize =
        yesSize + "px";

    document.getElementById("no").style.fontSize =
        noSize + "px";

    if(noSize < 8){
        document.getElementById("no").style.display = "none";
    }

});

</script>
